# Teamwerk Testing Configuration Examples
# Copy the relevant section into your project's teamwerk-config.yml under the `testing:` key.
# All fields are optional — only configure what your project uses.

# ============================================================
# Example 1: Mobile (React Native + Maestro + Jest)
# ============================================================
# testing:
#   framework: maestro
#   result-format: junit-xml
#   session-strategy: shared-session
#   results-path: "fxmobile/test-reports/"
#   evidence-dir: "fxmobile/test-reports/screenshots/"
#
#   unit:
#     framework: jest
#     run_command: "cd fxmobile && npx jest"
#     report_command: "cd fxmobile && npx jest --reporters=default --reporters=jest-html-reporters"
#     report_output: "fxmobile/test-reports/unit-report.html"
#
#   e2e:
#     framework: maestro
#     test_dir: "fxmobile/__tests__/e2e/screens"
#     flows_dir: "fxmobile/__tests__/e2e/flows"
#     bugs_dir: "fxmobile/__tests__/e2e/bugs"
#     run_command: "cd fxmobile && npm run test:smoke"
#     report_command: "cd fxmobile && node scripts/generate-e2e-report.js"
#     report_output: "fxmobile/test-reports/e2e-report.html"
#
#   tiers:
#     config: "fxmobile/__tests__/config/test-tiers.json"
#     commands:
#       smoke: "cd fxmobile && npm run test:smoke"
#       feature: "cd fxmobile && npm run test:feature"
#       regression: "cd fxmobile && npm run test:regression"
#       pr: "cd fxmobile && npm run test:pr"
